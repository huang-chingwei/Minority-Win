<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>少数派团康 · 多人互动版</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { font-family:'Noto Sans SC',sans-serif; background:radial-gradient(circle at center,#0f172a 0%,#020617 100%); color:#f3f4f6; overflow-x:hidden; }
    .neon-red  { box-shadow:0 0 25px rgba(239,68,68,.15);  border-color:rgba(239,68,68,.3);  }
    .neon-gray { box-shadow:0 0 25px rgba(148,163,184,.1); border-color:rgba(148,163,184,.15);}
    .no-select { user-select:none; -webkit-user-select:none; }
    @keyframes floatUp {
      0%   { transform:translate(-50%,0) scale(.8); opacity:0; }
      50%  { opacity:1; }
      100% { transform:translate(-50%,-60px) scale(1.2); opacity:0; }
    }
    .float-anim { animation:floatUp .8s cubic-bezier(.18,.89,.32,1.28) forwards; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .spin { animation:spin 1s linear infinite; }
    .screen { display:none; }
    .screen.active { display:flex; }
    /* Vote button states */
    .vote-btn { transition:all .2s; }
    .vote-btn.selected-black { background:linear-gradient(135deg,#1e293b,#0f172a); border:2px solid #94a3b8; box-shadow:0 0 20px rgba(148,163,184,.3); }
    .vote-btn.selected-red   { background:linear-gradient(135deg,#450a0a,#7f1d1d); border:2px solid #ef4444; box-shadow:0 0 20px rgba(239,68,68,.4); }
    .vote-btn.locked         { opacity:.6; pointer-events:none; cursor:not-allowed; }
    .vote-btn.winner         { box-shadow:0 0 30px rgba(250,204,21,.5); border-color:#fbbf24; }
    /* Pulse dot */
    @keyframes pulse-dot { 0%,100%{opacity:1;} 50%{opacity:.3;} }
    .pulse-dot { animation:pulse-dot 1.5s ease-in-out infinite; }
  </style>
</head>
<body class="min-h-screen no-select">

<!-- ═══════════════════════════════════════════════
     SCREEN 1 · LOGIN
═══════════════════════════════════════════════ -->
<div id="loginScreen" class="screen active flex-col justify-center items-center min-h-screen px-4 py-8">
  <div class="w-full max-w-sm bg-slate-900/90 border border-slate-800 p-7 rounded-3xl shadow-2xl space-y-6 text-center">
    <!-- Logo -->
    <div class="space-y-2">
      <div class="w-16 h-16 rounded-2xl bg-gradient-to-tr from-red-600 to-amber-500 flex items-center justify-center mx-auto shadow-lg">
        <i class="fa-solid fa-scale-unbalanced text-white text-2xl"></i>
      </div>
      <h1 class="text-xl font-black tracking-widest bg-gradient-to-r from-red-500 to-amber-400 bg-clip-text text-transparent">少数派团康</h1>
      <p class="text-xs text-slate-400">多人互动版 · 96题修罗场</p>
    </div>
    <!-- Nickname -->
    <div class="space-y-2 text-left">
      <label class="text-xs font-bold text-slate-400 uppercase tracking-wider">你的暱称</label>
      <input id="nicknameInput" type="text" maxlength="12" placeholder="输入最多12个字的暱称..."
        class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-white text-sm font-bold focus:outline-none focus:ring-2 focus:ring-red-500 placeholder:text-slate-600">
    </div>
    <!-- Role selection -->
    <div class="space-y-2 text-left">
      <label class="text-xs font-bold text-slate-400 uppercase tracking-wider">选择你的身份</label>
      <div class="grid grid-cols-2 gap-3">
        <button id="roleHost" onclick="selectRole('host')"
          class="role-btn py-4 rounded-2xl border-2 border-slate-800 bg-slate-950 flex flex-col items-center space-y-1.5 transition hover:border-amber-500">
          <i class="fa-solid fa-crown text-amber-400 text-lg"></i>
          <span class="text-xs font-black text-white">0号主持人</span>
          <span class="text-[10px] text-slate-500">控场 · 结算</span>
        </button>
        <button id="rolePlayer" onclick="selectRole('player')"
          class="role-btn py-4 rounded-2xl border-2 border-slate-800 bg-slate-950 flex flex-col items-center space-y-1.5 transition hover:border-red-500">
          <i class="fa-solid fa-user text-red-400 text-lg"></i>
          <span class="text-xs font-black text-white">参与者</span>
          <span class="text-[10px] text-slate-500">投票 · 竞技</span>
        </button>
      </div>
    </div>
    <p id="loginErr" class="text-xs text-red-500 hidden">请输入暱称并选择身份</p>
    <button onclick="confirmLogin()"
      class="w-full py-3.5 rounded-xl bg-gradient-to-r from-red-600 to-amber-500 hover:from-red-500 hover:to-amber-400 text-slate-950 font-black text-sm tracking-widest transition shadow-lg active:scale-95">
      进入游戏
    </button>
    <!-- Init / Reset -->
    <button onclick="triggerFullReset()" class="text-[10px] text-slate-600 hover:text-red-400 transition">
      <i class="fa-solid fa-arrow-rotate-left mr-1"></i>清除所有存档 / 重置
    </button>
  </div>
</div>

<!-- ═══════════════════════════════════════════════
     SCREEN 2 · GROUP SELECT
═══════════════════════════════════════════════ -->
<div id="groupScreen" class="screen flex-col min-h-screen px-4 py-6 space-y-5">
  <!-- Header -->
  <div class="flex items-center justify-between pt-2">
    <div>
      <p id="greetText" class="text-xs text-slate-400"></p>
      <h2 class="text-base font-black text-white">选择题组，开始挑战</h2>
    </div>
    <button onclick="showLogout()" class="text-xs text-slate-500 hover:text-red-400 transition flex items-center space-x-1">
      <i class="fa-solid fa-right-from-bracket"></i><span>切换</span>
    </button>
  </div>
  <!-- Group cards -->
  <div class="space-y-4 flex-grow" id="groupList">
    <!-- dynamically rendered -->
  </div>
  <!-- GAS status indicator -->
  <div id="gasStatusBar" class="py-2 px-3 rounded-xl text-[10px] font-bold flex items-center space-x-2 border border-slate-800 bg-slate-950/60">
    <span id="gasStatusDot" class="w-2 h-2 rounded-full bg-slate-600"></span>
    <span id="gasStatusText" class="text-slate-500">离线模式 · 尚未连接后端</span>
  </div>
</div>

<!-- ═══════════════════════════════════════════════
     SCREEN 3 · DECK (QUESTION CARD)
═══════════════════════════════════════════════ -->
<div id="deckScreen" class="screen flex-col min-h-screen">
  <!-- Top nav -->
  <header class="px-5 py-3 border-b border-slate-900/80 bg-slate-950/40 backdrop-blur-md flex justify-between items-center shrink-0">
    <button onclick="goToGroups()" class="flex items-center space-x-2 text-slate-400 hover:text-white transition">
      <i class="fa-solid fa-chevron-left text-xs"></i>
      <span id="deckGroupLabel" class="text-xs font-black text-red-400"></span>
    </button>
    <div class="flex items-center space-x-2">
      <span id="deckProgressLabel" class="text-[10px] font-bold text-slate-500 bg-slate-900 border border-slate-800 px-2.5 py-1 rounded-full"></span>
      <button onclick="toggleQuickSelect()" class="px-3 h-8 rounded-xl bg-slate-900/90 border border-slate-800 hover:bg-slate-800 text-slate-300 flex items-center space-x-1 transition">
        <i class="fa-solid fa-list-ol text-xs"></i>
        <span class="text-xs font-bold">跳转</span>
      </button>
    </div>
  </header>

  <!-- Card -->
  <main class="flex-grow flex flex-col items-center px-4 py-4 space-y-4 max-w-xl mx-auto w-full overflow-y-auto">
    <div class="w-full" id="cardDeckFrame">
      <div id="cardInner" class="w-full bg-gradient-to-b from-slate-900 to-slate-950 border p-5 flex flex-col justify-between rounded-3xl relative overflow-hidden shadow-2xl neon-gray" style="min-height:300px;">
        <div class="absolute -right-20 -bottom-20 w-56 h-56 bg-red-500/10 blur-[80px] rounded-full pointer-events-none"></div>
        <div class="absolute -left-20 -top-20 w-56 h-56 bg-slate-500/5 blur-[80px] rounded-full pointer-events-none"></div>
        <!-- Card header -->
        <div class="flex justify-between items-center z-10 pb-2.5 border-b border-slate-900/60">
          <span id="cardNumBadge" class="text-[10px] font-black tracking-wider bg-red-500/10 text-red-400 px-3 py-1 rounded-full border border-red-500/20"></span>
          <span id="cardTopicBadge" class="text-xs font-extrabold text-red-500 tracking-widest uppercase"></span>
        </div>
        <!-- Question -->
        <div class="my-auto text-center py-3 z-10 px-1">
          <h2 id="cardDesc" class="text-base sm:text-lg font-black leading-snug text-white tracking-wide"></h2>
        </div>
        <!-- Options -->
        <div class="space-y-3 z-10">
          <div class="bg-black/60 border border-slate-800/80 p-3 rounded-2xl">
            <div class="flex items-center space-x-1.5 mb-1">
              <span class="text-[9px] font-black uppercase tracking-wider bg-slate-800 border border-slate-700 text-slate-300 px-2 py-0.5 rounded">黑色选项</span>
              <i class="fa-solid fa-moon text-slate-400 text-[10px]"></i>
            </div>
            <p id="blackText" class="text-slate-100 font-bold text-xs leading-relaxed"></p>
          </div>
          <div class="bg-red-950/15 border border-red-900/25 p-3 rounded-2xl">
            <div class="flex items-center space-x-1.5 mb-1">
              <span class="text-[9px] font-black uppercase tracking-wider bg-red-950 border border-red-900/30 text-red-400 px-2 py-0.5 rounded">红色选项</span>
              <i class="fa-solid fa-fire text-red-500 text-[10px]"></i>
            </div>
            <p id="redText" class="text-slate-100 font-bold text-xs leading-relaxed"></p>
          </div>
        </div>
        <div class="text-center pt-2 z-10 text-slate-500 text-[10px] flex items-center justify-center space-x-1.5 border-t border-slate-900/60">
          <i class="fa-solid fa-arrows-left-right"></i>
          <span class="font-bold">左右滑动 或 方向键 切换题目</span>
        </div>
      </div>
    </div>

    <!-- ── PARTICIPANT VOTE PANEL ── -->
    <div id="playerVotePanel" class="w-full bg-slate-900/60 border border-slate-800/80 rounded-3xl p-5 shadow-2xl space-y-4 hidden">
      <h3 class="text-xs font-black text-white uppercase tracking-wider flex items-center space-x-1">
        <i class="fa-solid fa-hand-pointer text-red-500"></i>
        <span>投出你的抉择</span>
      </h3>
      <div class="grid grid-cols-2 gap-3">
        <button id="voteBlackBtn" onclick="castVote('black')"
          class="vote-btn py-5 rounded-2xl border-2 border-slate-700 bg-slate-950/80 flex flex-col items-center space-y-1.5 active:scale-95">
          <i class="fa-solid fa-moon text-slate-300 text-xl"></i>
          <span class="text-xs font-black text-white">黑色</span>
          <span class="text-[10px] text-slate-500">黑桃 / 梅花</span>
        </button>
        <button id="voteRedBtn" onclick="castVote('red')"
          class="vote-btn py-5 rounded-2xl border-2 border-red-900/60 bg-red-950/20 flex flex-col items-center space-y-1.5 active:scale-95">
          <i class="fa-solid fa-fire text-red-400 text-xl"></i>
          <span class="text-xs font-black text-white">红色</span>
          <span class="text-[10px] text-slate-500">红桃 / 方块</span>
        </button>
      </div>
      <!-- Vote status -->
      <div id="voteStatus" class="text-center text-xs text-slate-500 hidden">
        <i class="fa-solid fa-clock pulse-dot mr-1 text-amber-400"></i>
        <span>已投票，等待主持人结算...</span>
      </div>
      <!-- Result banner (shows after settlement) -->
      <div id="voteResultBanner" class="hidden rounded-2xl p-4 text-center space-y-1">
        <p id="voteResultTitle" class="text-base font-black"></p>
        <p id="voteResultRatio" class="text-xs text-slate-300"></p>
        <p id="voteResultSelf" class="text-xs font-bold"></p>
      </div>
    </div>

    <!-- ── HOST CONTROL PANEL ── -->
    <div id="hostControlPanel" class="w-full bg-slate-900/60 border border-amber-900/40 rounded-3xl p-5 shadow-2xl space-y-4 hidden">
      <div class="flex items-center justify-between">
        <h3 class="text-xs font-black text-amber-400 uppercase tracking-wider flex items-center space-x-1">
          <i class="fa-solid fa-crown"></i>
          <span>主持人控台</span>
        </h3>
        <span id="hostGameStateLabel" class="text-[10px] font-bold text-slate-500 bg-slate-950 border border-slate-800 px-2 py-1 rounded-full">投票中</span>
      </div>
      <!-- Settle: input vote counts (offline mode) -->
      <div id="hostSettleInputs" class="space-y-3">
        <p class="text-[11px] text-slate-400">请主持人统计现场举牌人数后输入：</p>
        <div class="grid grid-cols-2 gap-3">
          <div class="bg-slate-950 border border-slate-800 rounded-xl p-3 space-y-1">
            <label class="text-[10px] text-slate-400 font-bold flex items-center space-x-1">
              <i class="fa-solid fa-moon"></i><span>黑色人数</span>
            </label>
            <input id="blackCountInput" type="number" min="0" value="0"
              class="w-full bg-transparent text-white text-xl font-black text-center focus:outline-none focus:ring-1 focus:ring-slate-600 rounded">
          </div>
          <div class="bg-slate-950 border border-red-900/40 rounded-xl p-3 space-y-1">
            <label class="text-[10px] text-red-400 font-bold flex items-center space-x-1">
              <i class="fa-solid fa-fire"></i><span>红色人数</span>
            </label>
            <input id="redCountInput" type="number" min="0" value="0"
              class="w-full bg-transparent text-white text-xl font-black text-center focus:outline-none focus:ring-1 focus:ring-red-900 rounded">
          </div>
        </div>
        <button onclick="hostSettle()"
          class="w-full py-3.5 rounded-xl bg-gradient-to-r from-amber-600 to-orange-600 hover:from-amber-500 hover:to-orange-500 text-slate-950 font-black text-sm tracking-widest transition shadow-lg active:scale-95">
          <i class="fa-solid fa-gavel mr-1"></i>结算本题
        </button>
      </div>
      <!-- After settle: result display for host too -->
      <div id="hostSettleResult" class="hidden rounded-2xl p-4 text-center space-y-2 bg-slate-950/60 border border-slate-800">
        <p id="hostResultRatio" class="text-sm font-black text-white"></p>
        <p id="hostResultMinority" class="text-xs text-amber-400"></p>
        <button onclick="hostNextQuestion()"
          class="mt-2 w-full py-3 rounded-xl bg-gradient-to-r from-slate-700 to-slate-800 hover:from-slate-600 hover:to-slate-700 text-white font-black text-xs tracking-widest transition active:scale-95">
          <i class="fa-solid fa-forward mr-1"></i>下一题
        </button>
      </div>
    </div>

    <!-- Score panel (for both) -->
    <div class="w-full bg-slate-900/60 border border-slate-800/80 rounded-3xl p-4 shadow-xl space-y-3 relative">
      <div class="flex justify-between items-center">
        <h3 class="text-xs font-black text-white uppercase tracking-wider flex items-center space-x-1">
          <i class="fa-solid fa-trophy text-amber-400"></i>
          <span id="scorePlayerName">我的得分</span>
        </h3>
        <button onclick="triggerResetScoreConfirm()" class="text-[10px] text-slate-600 hover:text-red-400 transition flex items-center space-x-1">
          <i class="fa-solid fa-trash-can"></i><span>重置</span>
        </button>
      </div>
      <div class="flex items-center justify-between bg-slate-950/70 border border-slate-800/80 rounded-2xl p-3">
        <div>
          <p class="text-xs font-bold text-slate-400">少数派次数</p>
          <p class="text-[10px] text-slate-600 mt-0.5" id="scoreGroupLabel">当前题组</p>
        </div>
        <div class="flex items-center space-x-2">
          <button onclick="manualDecrement()" class="w-7 h-7 rounded-lg bg-slate-900 hover:bg-slate-800 border border-slate-800 flex items-center justify-center text-slate-400 text-sm font-black">-</button>
          <div id="scoreDisplay" class="bg-gradient-to-tr from-yellow-400 to-amber-500 bg-clip-text text-transparent text-4xl font-black min-w-[40px] text-center">0</div>
          <div id="scoreAnchor" class="relative pointer-events-none"></div>
        </div>
      </div>
      <!-- Manual +1 for offline use -->
      <button onclick="manualMinorityAdd()" id="manualAddBtn"
        class="w-full py-4 rounded-2xl bg-gradient-to-r from-indigo-600 via-purple-600 to-pink-600 hover:from-indigo-500 hover:to-pink-500 text-white font-black text-sm tracking-widest shadow-lg active:scale-95 transition flex items-center justify-center space-x-2 border border-white/10">
        <i class="fa-solid fa-hand-holding-hand animate-bounce"></i>
        <span>本轮我是少数派 (+1)</span>
      </button>
    </div>
  </main>

  <!-- Footer nav -->
  <footer class="p-4 space-y-3 shrink-0 border-t border-slate-900/60 bg-slate-950/40 backdrop-blur-md">
    <div class="max-w-xs mx-auto">
      <div class="flex justify-between text-[10px] text-slate-600 font-bold mb-1">
        <span>题组进度</span>
        <span id="footerProgress"></span>
      </div>
      <div class="w-full h-1 bg-slate-950 rounded-full overflow-hidden border border-slate-900">
        <div id="progressBar" class="h-full bg-gradient-to-r from-red-600 to-amber-500 transition-all duration-300 w-0"></div>
      </div>
    </div>
    <div class="flex justify-center items-center space-x-5 max-w-sm mx-auto">
      <button onclick="prevCard()" class="w-12 h-12 rounded-full bg-slate-900/90 hover:bg-slate-800 border border-slate-800/80 hover:text-white flex items-center justify-center transition active:scale-95 shadow-lg">
        <i class="fa-solid fa-chevron-left text-lg"></i>
      </button>
      <button onclick="toggleQuickSelect()" class="px-5 py-3 rounded-full bg-slate-900 hover:bg-slate-800 border border-slate-800 text-slate-300 font-black text-xs tracking-widest uppercase transition active:scale-95 shadow-lg flex items-center space-x-2">
        <i class="fa-solid fa-list-ol"></i>
        <span>跳转</span>
      </button>
      <button onclick="nextCard()" class="w-12 h-12 rounded-full bg-slate-900/90 hover:bg-slate-800 border border-slate-800/80 hover:text-white flex items-center justify-center transition active:scale-95 shadow-lg">
        <i class="fa-solid fa-chevron-right text-lg"></i>
      </button>
    </div>
  </footer>
</div>

<!-- ═══════════════════════════════════════════════
     QUICK SELECT DRAWER
═══════════════════════════════════════════════ -->
<div id="quickSelectOverlay" class="fixed inset-0 bg-slate-950/95 backdrop-blur-md z-40 hidden flex flex-col p-5 space-y-4">
  <div class="flex justify-between items-center border-b border-slate-900 pb-3">
    <h3 class="text-sm font-black text-white flex items-center space-x-2">
      <i class="fa-solid fa-table-cells text-red-500"></i>
      <span id="quickSelectTitle">跳转题目</span>
    </h3>
    <button onclick="toggleQuickSelect()" class="w-8 h-8 rounded-full bg-slate-900 hover:bg-slate-800 flex items-center justify-center text-slate-400">
      <i class="fa-solid fa-xmark"></i>
    </button>
  </div>
  <div class="grid grid-cols-5 sm:grid-cols-8 gap-2.5 overflow-y-auto flex-grow" id="quickIndexGrid"></div>
</div>

<!-- ═══════════════════════════════════════════════
     MODAL · SETTLE RESULT (full-screen)
═══════════════════════════════════════════════ -->
<div id="settleModal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 hidden items-center justify-center p-4">
  <div class="w-full max-w-xs bg-slate-900 border border-slate-800 rounded-3xl p-6 text-center space-y-5 shadow-2xl">
    <div id="settleIcon" class="w-16 h-16 rounded-2xl flex items-center justify-center mx-auto text-2xl"></div>
    <div>
      <p id="settleTitle" class="text-lg font-black text-white mb-1"></p>
      <p id="settleRatio" class="text-sm text-slate-300"></p>
      <p id="settleSelf" class="text-xs text-slate-400 mt-1"></p>
    </div>
    <button onclick="closeSettleModal()" class="w-full py-3 rounded-xl bg-gradient-to-r from-red-600 to-amber-500 text-slate-950 font-black text-sm transition active:scale-95">
      继续下一题
    </button>
  </div>
</div>

<!-- ═══════════════════════════════════════════════
     MODAL · RESET CONFIRM
═══════════════════════════════════════════════ -->
<div id="resetModal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 hidden items-center justify-center p-4">
  <div class="w-full max-w-xs bg-slate-900 border border-slate-800 rounded-3xl p-6 text-center space-y-4 shadow-2xl">
    <div class="w-12 h-12 rounded-xl bg-red-600/10 text-red-500 flex items-center justify-center mx-auto text-xl">
      <i class="fa-solid fa-triangle-exclamation"></i>
    </div>
    <div>
      <h3 id="resetModalTitle" class="text-sm font-bold text-white mb-1">确定重置分数？</h3>
      <p id="resetModalDesc" class="text-xs text-slate-400">这将清空本题组的所有得分记录，不可撤销。</p>
    </div>
    <div class="flex space-x-2 pt-1">
      <button onclick="closeResetModal()" class="flex-1 py-2.5 rounded-xl bg-slate-800 hover:bg-slate-700 text-slate-300 font-bold text-xs transition">取消</button>
      <button id="resetConfirmBtn" class="flex-1 py-2.5 rounded-xl bg-red-600 hover:bg-red-500 text-white font-bold text-xs transition">确定清空</button>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════
     JS APPLICATION LOGIC
═══════════════════════════════════════════════ -->
<script>
// ─────────────────────────────────────────────
//  CONFIG
// ─────────────────────────────────────────────
// Fill in your deployed GAS URL after setting up the backend:
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwy1WAencmcS462RkmondlDFTTkLTT7HUCJnFUWbn8-jjDHBEKHcy2DGu2M15wHWU_4/exec';  // e.g. 'https://script.google.com/macros/s/AKfy.../exec'
const POLL_INTERVAL_MS = 3000;

// ─────────────────────────────────────────────

// ─────────────────────────────────────────────
//  APP STATE
// ─────────────────────────────────────────────
let identity   = null;   // {nickname, role:'host'|'player'}
let currentGroup = null; // group name string
let groupCards   = [];   // filtered cards for current group
let pointer      = 0;    // index within groupCards
let pollTimer    = null;
let selectedRole = null;

// Per-group score keys: 'mw_score_热与诚', etc.
// Per-group voted cards: 'mw_voted_热与诚', etc.
// Per-group pointer: 'mw_ptr_热与诚', etc.

// ─────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────
window.onload = () => {
  const saved = lsGet('mw_identity');
  if (saved) {
    identity = saved;
    showScreen('group');
  } else {
    showScreen('login');
  }
  document.getElementById('passcodeInput') && null; // no passcode in this version
};

// ─────────────────────────────────────────────
//  SCREEN ROUTER
// ─────────────────────────────────────────────
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const el = document.getElementById(name + 'Screen');
  if (el) el.classList.add('active');

  if (name === 'group') renderGroupScreen();
  if (name === 'deck')  renderDeckScreen();
}

// ─────────────────────────────────────────────
//  LOGIN
// ─────────────────────────────────────────────
function selectRole(role) {
  selectedRole = role;
  document.querySelectorAll('.role-btn').forEach(b => {
    b.classList.remove('border-amber-500','border-red-500','bg-amber-950/20','bg-red-950/20');
    b.classList.add('border-slate-800');
  });
  const btn = document.getElementById(role === 'host' ? 'roleHost' : 'rolePlayer');
  btn.classList.remove('border-slate-800');
  btn.classList.add(role === 'host' ? 'border-amber-500' : 'border-red-500',
                    role === 'host' ? 'bg-amber-950/20' : 'bg-red-950/20');
  playSynth('click');
}

function confirmLogin() {
  const nn = document.getElementById('nicknameInput').value.trim();
  const err = document.getElementById('loginErr');
  if (!nn || !selectedRole) { err.classList.remove('hidden'); return; }
  err.classList.add('hidden');
  identity = { nickname: nn, role: selectedRole };
  lsSet('mw_identity', identity);
  playSynth('click');
  showScreen('group');
}

function showLogout() {
  // goes back to login (clears identity but not scores)
  identity = null;
  lsRemove('mw_identity');
  selectedRole = null;
  document.querySelectorAll('.role-btn').forEach(b => {
    b.classList.remove('border-amber-500','border-red-500','bg-amber-950/20','bg-red-950/20');
    b.classList.add('border-slate-800');
  });
  document.getElementById('nicknameInput').value = '';
  showScreen('login');
}

function triggerFullReset() {
  const modal = document.getElementById('resetModal');
  document.getElementById('resetModalTitle').textContent = '清除所有存档？';
  document.getElementById('resetModalDesc').textContent = '这将清除你的暱称、身份及所有题组得分，无法撤销。';
  document.getElementById('resetConfirmBtn').onclick = () => {
    localStorage.clear();
    identity = null; selectedRole = null;
    document.getElementById('nicknameInput').value = '';
    document.querySelectorAll('.role-btn').forEach(b => {
      b.classList.remove('border-amber-500','border-red-500','bg-amber-950/20','bg-red-950/20');
      b.classList.add('border-slate-800');
    });
    closeResetModal();
    showScreen('login');
    toast('所有存档已清除！');
  };
  modal.classList.remove('hidden');
  modal.classList.add('flex');
}

// ─────────────────────────────────────────────
//  GROUP SCREEN
// ─────────────────────────────────────────────
function renderGroupScreen() {
  if (!identity) return;
  document.getElementById('greetText').textContent =
    `${identity.role === 'host' ? '👑 主持人' : '🎮 参与者'} · ${identity.nickname}`;

  const container = document.getElementById('groupList');
  container.innerHTML = '';

  GROUPS.forEach(g => {
    const cards     = ALL_CARDS.filter(c => c.group === g);
    const total     = cards.length;
    const ptr       = lsGet('mw_ptr_' + g) || 0;
    const score     = lsGet('mw_score_' + g) || 0;
    const col       = GROUP_COLORS[g];
    const pct       = Math.round((ptr / total) * 100);

    container.innerHTML += `
      <div class="bg-slate-900/60 border ${col.border} ${col.bg} rounded-3xl p-5 space-y-3 shadow-xl">
        <div class="flex items-center justify-between">
          <div class="flex items-center space-x-2">
            <div class="w-10 h-10 rounded-xl bg-slate-950/60 flex items-center justify-center">
              <i class="fa-solid ${col.icon} ${col.accent} text-lg"></i>
            </div>
            <div>
              <h3 class="text-base font-black text-white">${g}</h3>
              <p class="text-[10px] text-slate-400">共 ${total} 题</p>
            </div>
          </div>
          <div class="text-right">
            <p class="text-xs font-bold ${col.accent}">${ptr + 1} / ${total}</p>
            <p class="text-[10px] text-slate-500">少数派 <span class="font-black text-amber-400">${score}</span> 次</p>
          </div>
        </div>
        <div class="w-full h-1.5 bg-slate-950 rounded-full overflow-hidden">
          <div class="h-full bg-gradient-to-r from-red-600 to-amber-500 rounded-full transition-all" style="width:${pct}%"></div>
        </div>
        <button onclick="enterGroup('${g}')"
          class="w-full py-3 rounded-xl bg-slate-950/80 hover:bg-slate-800 border border-slate-800 text-white font-black text-xs tracking-widest uppercase transition active:scale-95 flex items-center justify-center space-x-2">
          <i class="fa-solid fa-play text-red-400"></i>
          <span>进入题组</span>
        </button>
      </div>`;
  });

  // GAS status
  if (GAS_URL) {
    document.getElementById('gasStatusDot').className = 'w-2 h-2 rounded-full bg-green-500 pulse-dot';
    document.getElementById('gasStatusText').textContent = '已连接后端 · 多人实时模式';
    document.getElementById('gasStatusText').className = 'text-green-400';
  }
}

function enterGroup(g) {
  playSynth('click');
  currentGroup = g;
  groupCards   = ALL_CARDS.filter(c => c.group === g);
  pointer      = lsGet('mw_ptr_' + g) || 0;
  showScreen('deck');
}

function goToGroups() {
  stopPoll();
  showScreen('group');
}

// ─────────────────────────────────────────────
//  DECK SCREEN
// ─────────────────────────────────────────────
function renderDeckScreen() {
  if (!currentGroup || !identity) return;

  // Labels
  document.getElementById('deckGroupLabel').textContent = currentGroup;
  document.getElementById('scorePlayerName').textContent = `${identity.nickname} 的得分`;
  document.getElementById('scoreGroupLabel').textContent = currentGroup + ' 题组';

  // Show/hide role panels
  const isHost = identity.role === 'host';
  document.getElementById('hostControlPanel').classList.toggle('hidden', !isHost);
  document.getElementById('playerVotePanel').classList.toggle('hidden', isHost);
  document.getElementById('manualAddBtn').classList.toggle('hidden', isHost);

  renderCard();
  buildQuickGrid();
  renderScore();

  if (GAS_URL && !isHost) startPoll();
}

function renderCard() {
  const card = groupCards[pointer];
  if (!card) return;

  document.getElementById('cardNumBadge').textContent     = `卡牌 ${card.id} · ${card.group}`;
  document.getElementById('cardTopicBadge').textContent   = card.topic;
  document.getElementById('cardDesc').textContent         = card.desc;
  document.getElementById('blackText').textContent        = card.black;
  document.getElementById('redText').textContent          = card.red;

  // Card glow
  const inner = document.getElementById('cardInner');
  inner.className = inner.className.replace(/neon-\w+/g, '');
  inner.classList.add(parseInt(card.id) % 2 === 0 ? 'neon-red' : 'neon-gray');

  // Progress
  const pct = ((pointer + 1) / groupCards.length) * 100;
  document.getElementById('progressBar').style.width     = pct + '%';
  document.getElementById('footerProgress').textContent  = `${pointer + 1} / ${groupCards.length}`;
  document.getElementById('deckProgressLabel').textContent = `${pointer + 1}/${groupCards.length}`;

  // Reset settle UI
  resetSettleUI();
  // Restore vote state for this card
  restoreVoteState(card.id);
}

function restoreVoteState(cardId) {
  const voted = (lsGet('mw_voted_' + currentGroup) || {})[cardId];
  const isHost = identity.role === 'host';
  if (isHost) return;

  const blackBtn = document.getElementById('voteBlackBtn');
  const redBtn   = document.getElementById('voteRedBtn');
  const status   = document.getElementById('voteStatus');
  const result   = document.getElementById('voteResultBanner');

  blackBtn.className = 'vote-btn py-5 rounded-2xl border-2 border-slate-700 bg-slate-950/80 flex flex-col items-center space-y-1.5 active:scale-95';
  redBtn.className   = 'vote-btn py-5 rounded-2xl border-2 border-red-900/60 bg-red-950/20 flex flex-col items-center space-y-1.5 active:scale-95';
  status.classList.add('hidden');
  result.classList.add('hidden');

  if (voted) {
    if (voted === 'black') blackBtn.classList.add('selected-black','locked');
    else                   redBtn.classList.add('selected-red','locked');
    blackBtn.classList.add('locked');
    redBtn.classList.add('locked');
    status.classList.remove('hidden');
  }
}

function resetSettleUI() {
  const isHost = identity.role === 'host';
  if (!isHost) return;
  document.getElementById('hostSettleInputs').classList.remove('hidden');
  document.getElementById('hostSettleResult').classList.add('hidden');
  document.getElementById('blackCountInput').value = '0';
  document.getElementById('redCountInput').value   = '0';
  document.getElementById('hostGameStateLabel').textContent = '投票中';
}

// ─────────────────────────────────────────────
//  NAVIGATION
// ─────────────────────────────────────────────
function nextCard() {
  if (pointer < groupCards.length - 1) {
    pointer++;
    lsSet('mw_ptr_' + currentGroup, pointer);
    playSynth('slide');
    animCard('right');
    renderCard();
  } else {
    toast('这已经是本题组最后一题了！🎉');
  }
}

function prevCard() {
  if (pointer > 0) {
    pointer--;
    lsSet('mw_ptr_' + currentGroup, pointer);
    playSynth('slide');
    animCard('left');
    renderCard();
  } else {
    toast('这已经是本题组第一题了！');
  }
}

function animCard(dir) {
  const f = document.getElementById('cardDeckFrame');
  f.style.transform = dir === 'right' ? 'translateX(8px)' : 'translateX(-8px)';
  setTimeout(() => f.style.transform = 'translateX(0)', 100);
}

function hostNextQuestion() {
  document.getElementById('hostSettleResult').classList.add('hidden');
  nextCard();
}

// ─────────────────────────────────────────────
//  VOTING (PARTICIPANT)
// ─────────────────────────────────────────────
function castVote(choice) {
  const card    = groupCards[pointer];
  const allVotes = lsGet('mw_voted_' + currentGroup) || {};
  if (allVotes[card.id]) return; // already voted

  allVotes[card.id] = choice;
  lsSet('mw_voted_' + currentGroup, allVotes);

  const blackBtn = document.getElementById('voteBlackBtn');
  const redBtn   = document.getElementById('voteRedBtn');
  blackBtn.classList.add('locked');
  redBtn.classList.add('locked');
  if (choice === 'black') blackBtn.classList.add('selected-black');
  else                    redBtn.classList.add('selected-red');

  document.getElementById('voteStatus').classList.remove('hidden');
  playSynth('score');

  // If GAS is connected, submit vote
  if (GAS_URL) gasSubmitVote(card.id, choice);
}

// ─────────────────────────────────────────────
//  HOST SETTLE
// ─────────────────────────────────────────────
function hostSettle() {
  const b = parseInt(document.getElementById('blackCountInput').value) || 0;
  const r = parseInt(document.getElementById('redCountInput').value)   || 0;
  if (b + r === 0) { toast('请至少输入一方的人数'); return; }

  const minority = b < r ? 'black' : (r < b ? 'red' : null); // null = tie
  const total    = b + r;
  const bPct     = Math.round((b / total) * 100);
  const rPct     = 100 - bPct;

  // Show result in host panel
  document.getElementById('hostSettleInputs').classList.add('hidden');
  document.getElementById('hostSettleResult').classList.remove('hidden');
  document.getElementById('hostResultRatio').textContent =
    `⚫ 黑色 ${b}人 (${bPct}%)   🔴 红色 ${r}人 (${rPct}%)`;
  document.getElementById('hostResultMinority').textContent =
    minority ? `少数派：${minority === 'black' ? '⚫ 黑色阵营' : '🔴 红色阵营'}` : '⚖️ 平局！双方人数相同';
  document.getElementById('hostGameStateLabel').textContent = '已结算';
  playSynth('score');

  // If GAS connected, push settlement
  if (GAS_URL) gasSettle(groupCards[pointer].id, b, r, minority);
}

// ─────────────────────────────────────────────
//  MANUAL SCORE (OFFLINE / PARTICIPANT)
// ─────────────────────────────────────────────
function manualMinorityAdd() {
  addScore(1);
  floatPoint('+1');
  playSynth('score');
}

function manualDecrement() {
  addScore(-1);
  playSynth('click');
}

function addScore(delta) {
  let s = (lsGet('mw_score_' + currentGroup) || 0) + delta;
  if (s < 0) s = 0;
  lsSet('mw_score_' + currentGroup, s);
  renderScore();
}

function renderScore() {
  const s = lsGet('mw_score_' + currentGroup) || 0;
  document.getElementById('scoreDisplay').textContent = s;
}

function floatPoint(text) {
  const anchor = document.getElementById('scoreAnchor');
  const el = document.createElement('div');
  el.className = 'float-anim absolute text-yellow-400 font-black text-2xl drop-shadow-lg pointer-events-none -translate-x-1/2 left-0 top-0';
  el.textContent = text;
  anchor.appendChild(el);
  setTimeout(() => el.remove(), 820);
}

// ─────────────────────────────────────────────
//  QUICK SELECT GRID
// ─────────────────────────────────────────────
function buildQuickGrid() {
  const grid = document.getElementById('quickIndexGrid');
  document.getElementById('quickSelectTitle').textContent = `${currentGroup} · 跳转题目`;
  grid.innerHTML = groupCards.map((card, i) => `
    <button onclick="jumpTo(${i})"
      class="quick-btn py-3 rounded-xl font-bold text-center border text-xs transition ${i === pointer ? 'border-red-500 bg-red-950/40 text-red-400' : 'border-slate-800 bg-slate-900/40 text-slate-400 hover:bg-slate-800 hover:text-white'}">
      ${card.id}
    </button>`).join('');
}

function jumpTo(i) {
  pointer = i;
  lsSet('mw_ptr_' + currentGroup, pointer);
  toggleQuickSelect();
  renderCard();
  playSynth('slide');
}

function toggleQuickSelect() {
  const el = document.getElementById('quickSelectOverlay');
  const hidden = el.classList.contains('hidden');
  if (hidden) { buildQuickGrid(); el.classList.remove('hidden'); }
  else        { el.classList.add('hidden'); }
}

// ─────────────────────────────────────────────
//  SCORE RESET
// ─────────────────────────────────────────────
function triggerResetScoreConfirm() {
  const modal = document.getElementById('resetModal');
  document.getElementById('resetModalTitle').textContent = '确定重置得分？';
  document.getElementById('resetModalDesc').textContent  = `这将清空「${currentGroup}」题组的所有得分与投票记录，不可撤销。`;
  document.getElementById('resetConfirmBtn').onclick = () => {
    lsSet('mw_score_' + currentGroup, 0);
    lsSet('mw_voted_' + currentGroup, {});
    renderScore();
    renderCard();
    closeResetModal();
    toast('得分已清空！');
  };
  modal.classList.remove('hidden');
  modal.classList.add('flex');
}

function closeResetModal() {
  const m = document.getElementById('resetModal');
  m.classList.add('hidden');
  m.classList.remove('flex');
}

// ─────────────────────────────────────────────
//  SETTLE MODAL (participant result popup)
// ─────────────────────────────────────────────
function showSettleModal(isMinority, blackCount, redCount, myVote) {
  const modal    = document.getElementById('settleModal');
  const icon     = document.getElementById('settleIcon');
  const title    = document.getElementById('settleTitle');
  const ratio    = document.getElementById('settleRatio');
  const self     = document.getElementById('settleSelf');
  const total    = blackCount + redCount;

  if (isMinority) {
    icon.className  = 'w-16 h-16 rounded-2xl flex items-center justify-center mx-auto text-2xl bg-yellow-500/20';
    icon.innerHTML  = '🏆';
    title.textContent = '🎉 你是少数派！得 +1 分';
    title.className   = 'text-lg font-black text-yellow-400 mb-1';
    addScore(1);
    floatPoint('+1');
    playSynth('score');
  } else {
    icon.className  = 'w-16 h-16 rounded-2xl flex items-center justify-center mx-auto text-2xl bg-slate-800';
    icon.innerHTML  = '😔';
    title.textContent = '你是多数派，继续加油！';
    title.className   = 'text-lg font-black text-slate-300 mb-1';
    playSynth('click');
  }

  const bPct = total > 0 ? Math.round((blackCount / total) * 100) : 0;
  const rPct = 100 - bPct;
  ratio.textContent = `⚫ 黑色 ${blackCount}人 (${bPct}%)  ·  🔴 红色 ${redCount}人 (${rPct}%)`;
  self.textContent  = `你选择了：${myVote === 'black' ? '⚫ 黑色' : '🔴 红色'}`;

  modal.classList.remove('hidden');
  modal.classList.add('flex');
}

function closeSettleModal() {
  const m = document.getElementById('settleModal');
  m.classList.add('hidden');
  m.classList.remove('flex');
  nextCard();
}

// ─────────────────────────────────────────────
//  TOUCH GESTURES
// ─────────────────────────────────────────────
let touchStartX = 0;
document.getElementById('cardDeckFrame').addEventListener('touchstart', e => {
  touchStartX = e.changedTouches[0].screenX;
}, { passive: true });
document.getElementById('cardDeckFrame').addEventListener('touchend', e => {
  const diff = touchStartX - e.changedTouches[0].screenX;
  if (Math.abs(diff) > 55) diff > 0 ? nextCard() : prevCard();
}, { passive: true });

document.addEventListener('keydown', e => {
  if (document.getElementById('deckScreen').classList.contains('active')) {
    if (e.key === 'ArrowRight' || e.key === ' ') nextCard();
    else if (e.key === 'ArrowLeft') prevCard();
  }
  if (document.getElementById('loginScreen').classList.contains('active') && e.key === 'Enter') {
    confirmLogin();
  }
});

// ─────────────────────────────────────────────
//  GAS API INTEGRATION STUBS
//  Fill in GAS_URL at the top to enable
// ─────────────────────────────────────────────
async function gasSubmitVote(cardId, choice) {
  if (!GAS_URL) return;
  try {
    await fetch(GAS_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        action:   'submitVote',
        nickname: identity.nickname,
        group:    currentGroup,
        cardId,
        choice,
        ts:       Date.now()
      })
    });
  } catch(e) { console.warn('GAS vote submit failed', e); }
}

async function gasSettle(cardId, blackCount, redCount, minority) {
  if (!GAS_URL) return;
  try {
    await fetch(GAS_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        action: 'settle',
        group:  currentGroup,
        cardId,
        blackCount,
        redCount,
        minority,
        ts:     Date.now()
      })
    });
  } catch(e) { console.warn('GAS settle failed', e); }
}

async function gasPollState() {
  if (!GAS_URL || identity.role !== 'player') return;
  try {
    const res  = await fetch(`${GAS_URL}?action=getState&group=${encodeURIComponent(currentGroup)}`);
    const data = await res.json();
    if (!data) return;

    // Sync current card if host advanced
    if (typeof data.currentCardId !== 'undefined') {
      const idx = groupCards.findIndex(c => c.id === data.currentCardId);
      if (idx !== -1 && idx !== pointer) {
        pointer = idx;
        lsSet('mw_ptr_' + currentGroup, pointer);
        renderCard();
      }
    }

    // Show settle result if host settled this card
    if (data.settled && data.settledCardId === groupCards[pointer]?.id) {
      const allVotes = lsGet('mw_voted_' + currentGroup) || {};
      const myVote   = allVotes[data.settledCardId];
      if (myVote) {
        const isMinority = (myVote === data.minority);
        showSettleModal(isMinority, data.blackCount, data.redCount, myVote);
        // Show result in vote panel too
        const banner = document.getElementById('voteResultBanner');
        banner.classList.remove('hidden');
        banner.className = `rounded-2xl p-4 text-center space-y-1 ${isMinority ? 'bg-yellow-950/40 border border-yellow-800/60' : 'bg-slate-950/60 border border-slate-800'}`;
        document.getElementById('voteResultTitle').textContent = isMinority ? '🏆 少数派！' : '😔 多数派';
        document.getElementById('voteResultTitle').className   = isMinority ? 'text-base font-black text-yellow-400' : 'text-base font-black text-slate-400';
        document.getElementById('voteResultRatio').textContent = `⚫ ${data.blackCount}人  ·  🔴 ${data.redCount}人`;
        document.getElementById('voteResultSelf').textContent  = `你选择了：${myVote === 'black' ? '⚫ 黑色' : '🔴 红色'}`;
      }
    }
  } catch(e) { console.warn('GAS poll failed', e); }
}

function startPoll() {
  stopPoll();
  pollTimer = setInterval(gasPollState, POLL_INTERVAL_MS);
}

function stopPoll() {
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
}

// ─────────────────────────────────────────────
//  AUDIO
// ─────────────────────────────────────────────
function playSynth(type) {
  try {
    const ctx  = new (window.AudioContext || window.webkitAudioContext)();
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    if (type === 'slide') {
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(220, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(350, ctx.currentTime + .12);
      gain.gain.setValueAtTime(.1, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(.01, ctx.currentTime + .12);
      osc.start(); osc.stop(ctx.currentTime + .12);
    } else if (type === 'score') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(523, ctx.currentTime);
      osc.frequency.setValueAtTime(659, ctx.currentTime + .08);
      gain.gain.setValueAtTime(.15, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(.01, ctx.currentTime + .35);
      osc.start(); osc.stop(ctx.currentTime + .35);
    } else {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(400, ctx.currentTime);
      gain.gain.setValueAtTime(.05, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(.01, ctx.currentTime + .05);
      osc.start(); osc.stop(ctx.currentTime + .05);
    }
  } catch(e) {}
}

// ─────────────────────────────────────────────
//  TOAST
// ─────────────────────────────────────────────
function toast(msg) {
  document.querySelectorAll('.custom-toast').forEach(e => e.remove());
  const div = document.createElement('div');
  div.className = 'custom-toast fixed bottom-24 left-1/2 -translate-x-1/2 z-[60] bg-slate-900 border border-slate-800 text-slate-100 text-xs px-4 py-2.5 rounded-full shadow-2xl font-bold transition-all duration-300 opacity-0 translate-y-3 text-center w-max max-w-[85vw]';
  div.textContent = msg;
  document.body.appendChild(div);
  setTimeout(() => div.classList.remove('opacity-0','translate-y-3'), 50);
  setTimeout(() => { div.classList.add('opacity-0','translate-y-3'); setTimeout(() => div.remove(), 250); }, 2500);
}

// ─────────────────────────────────────────────
//  LOCALSTORAGE HELPERS
// ─────────────────────────────────────────────
function lsGet(k)    { try { return JSON.parse(localStorage.getItem(k)); } catch { return null; } }
function lsSet(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} }
function lsRemove(k) { try { localStorage.removeItem(k); } catch {} }
</script>
